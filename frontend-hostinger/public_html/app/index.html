<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8" />
    <link rel="icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="theme-color" content="#007AFF" />
    <meta name="description" content="Flux Revenue - Otimização de Receita Google AdSense com IA Avançada" />
    
    <title>Flux Revenue - Otimização AdSense</title>
    
    <!-- ✅ Preload CRÍTICO dos bundles React -->
    <!-- Os paths aqui são relativos à raiz do domínio app.fluxrevenue.com.br -->
    <!-- Se app/ for a raiz, então /static/... está correto. -->
    <!-- Se app/ for um subdiretório, os paths podem precisar de ajuste ex: /app/static/... -->
    <!-- Vou assumir que app/ é a raiz do subdomínio app. -->
    <link rel="preload" href="/static/css/main.7c1a59a0.css" as="style">
    <link rel="preload" href="/static/js/runtime.8d383a98.js" as="script">
    <link rel="preload" href="/static/js/vendors.78dfa95f.js" as="script">
    <link rel="preload" href="/static/js/main.8ea78a99.js" as="script">
    
    <!-- ✅ Preconnections -->
    <!-- unpkg.com não é mais necessário se o SDK do Supabase está no bundle -->
    <!-- <link rel="preconnect" href="https://unpkg.com" crossorigin> -->
    <link rel="preconnect" href="https://cykfgwzzvlnkqundyxrq.supabase.co" crossorigin>
    
    <!-- ✅ CSS Crítico inline (Mantido) -->
    <style>
        body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
        .flux-loading {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            background: linear-gradient(135deg, #F2F2F7 0%, #E5E5EA 100%);
            z-index: 9999; transition: opacity 0.5s ease;
        }
        .flux-loading.hidden { opacity: 0; pointer-events: none; }
        .flux-content {
            text-align: center; padding: 48px; background: white;
            border-radius: 24px; box-shadow: 0 8px 32px rgba(0,0,0,0.12);
            max-width: 400px; margin: 0 24px;
        }
        .flux-spinner {
            width: 60px; height: 60px; margin: 0 auto 24px;
            background: linear-gradient(135deg, #007AFF 0%, #30D158 100%);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            animation: spin 2s linear infinite; font-size: 24px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .flux-emergency { 
            background: #ff4444 !important; color: white; padding: 12px 24px; 
            border: none; border-radius: 8px; cursor: pointer; margin-top: 16px;
            font-weight: 600; transition: background 0.3s;
        }
        .flux-emergency:hover { background: #cc0000 !important; }
        .flux-status { margin: 16px 0; color: #6D6D70; font-size: 16px; }
    </style>

    <!-- REMOVIDO: Inclusão dos scripts Supabase globais e do CDN -->
    <!-- <script src="/supabase/configv2.js" ...></script> -->
    <!-- <script src="https://unpkg.com/@supabase/supabase-js@2" ...></script> -->
    <!-- <script src="/supabase/flux-supabase.js" ...></script> -->

    <!-- CSS principal da aplicação React (gerado pelo build) -->
    <link href="/static/css/main.7c1a59a0.css" rel="stylesheet">

</head>
<body>
    <noscript>
        <div style="padding: 48px; text-align: center; background: #F2F2F7; min-height: 100vh; display: flex; align-items: center; justify-content: center;">
            <div style="background: white; padding: 48px; border-radius: 24px; max-width: 400px;">
                <h2 style="margin: 0 0 16px 0; color: #1D1D1F;">🚀 Flux Revenue</h2>
                <p style="margin: 0; color: #6D6D70;">JavaScript é necessário para usar esta aplicação.</p>
                <p style="margin: 16px 0 0 0; color: #8E8E93; font-size: 14px;">Por favor, habilite JavaScript em seu navegador.</p>
            </div>
        </div>
    </noscript>
    
    <div id="root">
        <div class="flux-loading" id="flux-loading">
            <div class="flux-content">
                <div class="flux-spinner">⚡</div>
                <h2 style="margin: 0 0 8px 0; color: #1D1D1F; font-size: 24px;">🚀 Flux Revenue</h2>
                <p id="flux-status" class="flux-status">Inicializando sistema...</p>
                <div id="flux-progress" style="width: 100%; max-width: 300px; height: 6px; background: rgba(0, 122, 255, 0.2); margin: 24px auto; border-radius: 3px; overflow: hidden;">
                    <div id="flux-bar" style="width: 0%; height: 100%; background: linear-gradient(90deg, #007AFF, #30D158); transition: width 0.3s ease; border-radius: 3px;"></div>
                </div>
                <button id="flux-emergency" class="flux-emergency" style="display: none;" onclick="fluxEmergencyReload()">🆘 Recarregar Forçado</button>
                <div id="flux-debug" style="margin-top: 16px; font-size: 12px; color: #8E8E93; display: none;">
                    <div>Tentativas: <span id="debug-attempts">0</span></div>
                    <div>Tempo: <span id="debug-time">0s</span></div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Script de inicialização e verificação de montagem do React (Mantido) -->
    <script>
        window.FluxState = {
            loaded: false,
            reactMounted: false,
            attempts: 0,
            maxAttempts: 20, // Reduzido para ~20 segundos de espera total
            startTime: Date.now(),
            isEmergencyMode: new URLSearchParams(window.location.search).get('emergency') === '1'
        };
        
        if (window.FluxState.isEmergencyMode) {
            console.log('🆘 Modo emergência ativado');
            setTimeout(() => {
                const debugEl = document.getElementById('flux-debug');
                if (debugEl) debugEl.style.display = 'block';
            }, 1000);
        }
        
        function updateFluxStatus(message, progress = -1) { // progress -1 para não mudar
            const statusEl = document.getElementById('flux-status');
            const barEl = document.getElementById('flux-bar');
            const emergencyBtn = document.getElementById('flux-emergency');
            const attemptsEl = document.getElementById('debug-attempts');
            const timeEl = document.getElementById('debug-time');
            
            if (statusEl) statusEl.textContent = message;
            if (barEl && progress >= 0) barEl.style.width = Math.min(100, Math.max(0, progress)) + '%';
            
            if (attemptsEl) attemptsEl.textContent = window.FluxState.attempts.toString();
            if (timeEl) {
                const elapsed = Math.round((Date.now() - window.FluxState.startTime) / 1000);
                timeEl.textContent = elapsed + 's';
            }
            console.log(`[FluxLoader] ${message} (${progress >=0 ? progress + '%' : 'no progress'})`);
            
            const showEmergency = window.FluxState.isEmergencyMode || (Date.now() - window.FluxState.startTime > 15000);
            if (showEmergency && emergencyBtn && emergencyBtn.style.display === 'none') {
                emergencyBtn.style.display = 'block';
            }
        }
        
        function fluxEmergencyReload() { /* ... (Mantido como antes) ... */ console.log('🆘 Emergency reload triggered by user'); updateFluxStatus('🆘 Limpando dados e recarregando...', 0); try { localStorage.clear(); sessionStorage.clear(); const cookies = document.cookie.split(';'); cookies.forEach(cookie => { const [name] = cookie.split('='); if (name.trim()) { document.cookie = `${name.trim()}=; expires=Thu, 01 Jan 1970 00:00:00 GMT; path=/; domain=${document.domain.split('.').slice(-2).join('.')}`; document.cookie = `${name.trim()}=; expires=Thu, 01 Jan 1970 00:00:00 GMT; path=/; domain=.${document.domain.split('.').slice(-2).join('.')}`; document.cookie = `${name.trim()}=; expires=Thu, 01 Jan 1970 00:00:00 GMT; path=/`; } }); console.log('✅ Dados limpos com sucesso'); } catch (error) { console.error('❌ Erro ao limpar dados:', error); } setTimeout(() => { const newUrl = window.location.origin + (window.FluxState.isEmergencyMode ? '/' : '/?emergency=1'); window.location.href = newUrl; }, 1000); }
        
        updateFluxStatus('Carregando aplicação...', 10);

        function checkReactMounted() {
            window.FluxState.attempts++;
            const root = document.getElementById('root');
            const loadingDiv = document.getElementById('flux-loading');
            
            // Verifica se o React substituiu o conteúdo do loader inicial
            if (root && (!loadingDiv || !root.contains(loadingDiv) || root.innerHTML.length > 1000 /* heurística */)) {
                console.log('✅ [FluxLoader] React montado com sucesso aparente.');
                window.FluxState.reactMounted = true;
                updateFluxStatus('✅ Aplicação carregada!', 100);
                if (loadingDiv) {
                    loadingDiv.classList.add('hidden');
                    setTimeout(() => { if (loadingDiv.parentNode) loadingDiv.parentNode.removeChild(loadingDiv); }, 500);
                }
                const loadTime = Date.now() - window.FluxState.startTime;
                console.log(`🎉 Flux Revenue App carregado em ${loadTime}ms`);
                return;
            }
            
            if (window.FluxState.attempts >= window.FluxState.maxAttempts) {
                console.warn('⚠️ [FluxLoader] Timeout de montagem do React. Removendo loader.');
                updateFluxStatus('⚠️ Timeout - Forçando exibição...', 95);
                if (loadingDiv) {
                    setTimeout(() => { loadingDiv.classList.add('hidden'); setTimeout(() => { if (loadingDiv.parentNode) loadingDiv.parentNode.removeChild(loadingDiv); }, 500); }, 1000);
                }
                return;
            }
            
            const progress = 10 + (window.FluxState.attempts / window.FluxState.maxAttempts) * 85;
            updateFluxStatus(`Aguardando componentes React... (${window.FluxState.attempts})`, progress);
            setTimeout(checkReactMounted, 500); // Verificar mais frequentemente
        }
        
        document.addEventListener('DOMContentLoaded', () => {
            console.log('✅ [FluxLoader] DOM carregado.');
            updateFluxStatus('DOM pronto, carregando scripts...', 20);
            // Os scripts da app React são carregados com 'defer', então devem executar após o DOM.
            // A verificação de montagem do React começará após um pequeno delay.
            setTimeout(checkReactMounted, 1000); // Delay inicial antes de começar a checar
        });

        window.addEventListener('error', (event) => { /* ... (Mantido como antes) ... */ console.error('❌ Global error (index.html):', event.error); if (event.error?.message?.includes('Loading chunk') || event.error?.message?.includes('ChunkLoadError')) { updateFluxStatus('❌ Erro de carregamento de módulo - tentando recarregar...', 0); setTimeout(() => window.location.reload(), 3000); } });
        window.addEventListener('unhandledrejection', (event) => { /* ... (Mantido como antes) ... */ console.error('❌ Unhandled rejection (index.html):', event.reason); });
    </script>
    
    <!-- Bundles da Aplicação React (Mantidos) -->
    <script defer="defer" src="/static/js/runtime.8d383a98.js"></script>
    <script defer="defer" src="/static/js/vendors.78dfa95f.js"></script>
    <script defer="defer" src="/static/js/main.8ea78a99.js"></script>
    
</body>
</html>
