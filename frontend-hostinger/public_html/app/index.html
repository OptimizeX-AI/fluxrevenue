    <!-- ✅ CSS Crítico inline (Mantido) -->
    <style>
        body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
        .flux-loading {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            background: linear-gradient(135deg, #F2F2F7 0%, #E5E5EA 100%);

        .flux-loading.hidden { opacity: 0; pointer-events: none; }
        .flux-content {

            border-radius: 24px; box-shadow: 0 8px 32px rgba(0,0,0,0.12);

            width: 60px; height: 60px; margin: 0 auto 24px;

            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            animation: spin 2s linear infinite; font-size: 24px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

            background: #ff4444 !important; color: white; padding: 12px 24px; 
            border: none; border-radius: 8px; cursor: pointer; margin-top: 16px;

<body>
    <noscript>
        <div style="padding: 48px; text-align: center; background: #F2F2F7; min-height: 100vh; display: flex; align-items: center; justify-content: center;">
            <div style="background: white; padding: 48px; border-radius: 24px; max-width: 400px;">
                <h2 style="margin: 0 0 16px 0; color: #1D1D1F;">🚀 Flux Revenue</h2>
                <p style="margin: 0; color: #6D6D70;">JavaScript é necessário para usar esta aplicação.</p>
                <p style="margin: 16px 0 0 0; color: #8E8E93; font-size: 14px;">Por favor, habilite JavaScript em seu navegador.</p>
            </div>

    <div id="root">
        <div class="flux-loading" id="flux-loading">
            <div class="flux-content">
                <div class="flux-spinner">⚡</div>
                <h2 style="margin: 0 0 8px 0; color: #1D1D1F; font-size: 24px;">🚀 Flux Revenue</h2>
                <p id="flux-status" class="flux-status">Inicializando sistema...</p>
                <div id="flux-progress" style="width: 100%; max-width: 300px; height: 6px; background: rgba(0, 122, 255, 0.2); margin: 24px auto; border-radius: 3px; overflow: hidden;">
                    <div id="flux-bar" style="width: 0%; height: 100%; background: linear-gradient(90deg, #007AFF, #30D158); transition: width 0.3s ease; border-radius: 3px;"></div>
                </div>
                <button id="flux-emergency" class="flux-emergency" style="display: none;" onclick="fluxEmergencyReload()">🆘 Recarregar Forçado</button>
                <div id="flux-debug" style="margin-top: 16px; font-size: 12px; color: #8E8E93; display: none;">
                    <div>Tentativas: <span id="debug-attempts">0</span></div>
                    <div>Tempo: <span id="debug-time">0s</span></div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- ✅ BRIDGE DE AUTENTICAÇÃO CROSS-DOMAIN -->
    <script>
        // ✅ Função para restaurar sessão do cookie cross-domain
        window.FluxAuthBridge = {
            restored: false,
            
            async restoreSessionFromCookie() {
                try {
                    console.log('🔍 [AuthBridge] Verificando cookie de sessão...');
                    
                    const cookie = document.cookie
                        .split(';')
                        .find(c => c.trim().startsWith('sb-flux-session='));
                    
                    if (!cookie) {
                        console.log('🔍 [AuthBridge] Nenhum cookie de sessão encontrado');
                        return null;
                    }
                    
                    const sessionData = JSON.parse(decodeURIComponent(cookie.split('=')[1]));
                    console.log('✅ [AuthBridge] Cookie de sessão encontrado:', {
                        user: sessionData.user?.email,
                        expires_at: sessionData.expires_at
                    });
                    
                    // Aguardar Supabase estar disponível
                    let attempts = 0;
                    while (!window.supabase && attempts < 50) {
                        await new Promise(resolve => setTimeout(resolve, 100));
                        attempts++;
                    }
                    
                    if (!window.supabase) {
                        console.error('❌ [AuthBridge] Supabase não disponível após 5s');
                        return null;
                    }
                    
                    // Verificar se a sessão ainda é válida
                    const now = Math.floor(Date.now() / 1000);
                    if (sessionData.expires_at && sessionData.expires_at < now) {
                        console.warn('⚠️ [AuthBridge] Sessão expirada, removendo cookie');
                        this.clearSessionCookie();
                        return null;
                    }
                    
                    // Tentar restaurar a sessão no Supabase
                    const { data: currentSession } = await window.supabase.auth.getSession();
                    
                    if (currentSession.session?.user?.id === sessionData.user?.id) {
                        console.log('✅ [AuthBridge] Sessão já ativa no Supabase');
                        this.restored = true;
                        return currentSession.session;
                    }
                    
                    // Restaurar sessão usando refresh token
                    if (sessionData.refresh_token) {
                        console.log('🔄 [AuthBridge] Restaurando sessão usando refresh token...');
                        const { data, error } = await window.supabase.auth.setSession({
                            access_token: sessionData.access_token,
                            refresh_token: sessionData.refresh_token
                        });
                        
                        if (error) {
                            console.error('❌ [AuthBridge] Erro ao restaurar sessão:', error);
                            this.clearSessionCookie();
                            return null;
                        }
                        
                        console.log('✅ [AuthBridge] Sessão restaurada com sucesso');
                        this.restored = true;
                        return data.session;
                    }
                    
                    return null;
                } catch (error) {
                    console.error('❌ [AuthBridge] Erro ao restaurar sessão:', error);
                    this.clearSessionCookie();
                    return null;
                }
            },
            
            clearSessionCookie() {
                try {
                    const domain = '.fluxrevenue.com.br';
                    document.cookie = `sb-flux-session=; Domain=${domain}; Path=/; expires=Thu, 01 Jan 1970 00:00:00 GMT`;
                    console.log('🧹 [AuthBridge] Cookie de sessão removido');
                } catch (error) {
                    console.error('❌ [AuthBridge] Erro ao remover cookie:', error);
                }
            },
            
            async init() {
                if (this.restored) return;
                
                try {
                    updateFluxStatus('Verificando autenticação...', 30);
                    const session = await this.restoreSessionFromCookie();
                    
                    if (session) {
                        console.log('✅ [AuthBridge] Usuário autenticado:', session.user.email);
                        updateFluxStatus('Usuário autenticado - carregando dashboard...', 50);
                    } else {
                        console.log('🔍 [AuthBridge] Nenhuma sessão válida encontrada');
                        updateFluxStatus('Carregando aplicação...', 40);
                    }
                } catch (error) {
                    console.error('❌ [AuthBridge] Erro na inicialização:', error);
                    updateFluxStatus('Erro de autenticação - continuando...', 35);
                }
            }
        };
        
        // ✅ Executar bridge quando DOM estiver pronto
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', () => {
                setTimeout(() => window.FluxAuthBridge.init(), 500);
            });
        } else {
            setTimeout(() => window.FluxAuthBridge.init(), 500);
        }
    </script>

    <!-- ✅ SISTEMA DE DEBUG PARA APP REACT -->
    <script>
        window.FluxDebug = {
            errors: [],
            logs: [],
            
            log(message, data = null) {
                const timestamp = new Date().toISOString();
                const logEntry = { timestamp, message, data, type: 'log' };
                this.logs.push(logEntry);
                console.log(`🔍 [FluxDebug] ${message}`, data || '');
                
                // Manter apenas últimos 100 logs
                if (this.logs.length > 100) {
                    this.logs = this.logs.slice(-100);
                }
            },
            
            error(message, error = null) {
                const timestamp = new Date().toISOString();
                const errorEntry = { timestamp, message, error: error?.toString(), type: 'error' };
                this.errors.push(errorEntry);
                console.error(`❌ [FluxDebug] ${message}`, error || '');
                
                // Manter apenas últimos 50 erros
                if (this.errors.length > 50) {
                    this.errors = this.errors.slice(-50);
                }
            },
            
            checkSupabaseStatus() {
                const status = {
                    globalSupabase: !!window.Supabase,
                    supabaseInstance: !!window.supabase,
                    supabaseAuth: !!window.supabase?.auth,
                    supabaseAuthMethods: !!window.supabase?.auth?.signInWithPassword,
                    fluxConfig: !!window.FluxConfig,
                    fluxLogin: !!window.fluxLogin,
                    fluxAuthBridge: !!window.FluxAuthBridge
                };
                
                this.log('Status dos componentes Supabase:', status);
                return status;
            },
            
            checkReactStatus() {
                const status = {
                    React: !!window.React,
                    ReactDOM: !!window.ReactDOM,
                    reactRoot: !!document.getElementById('root'),
                    reactMounted: document.getElementById('root')?.hasChildNodes() || false
                };
                
                this.log('Status dos componentes React:', status);
                return status;
            },
            
            async testAuthentication() {
                try {
                    this.log('Testando autenticação...');
                    
                    if (!window.supabase) {
                        throw new Error('Supabase não disponível');
                    }
                    
                    const { data: session } = await window.supabase.auth.getSession();
                    this.log('Sessão atual:', {
                        hasUser: !!session.session?.user,
                        userEmail: session.session?.user?.email,
                        expiresAt: session.session?.expires_at
                    });
                    
                    return session;
                } catch (error) {
                    this.error('Erro no teste de autenticação:', error);
                    return null;
                }
            },
            
            getReport() {
                return {
                    timestamp: new Date().toISOString(),
                    url: window.location.href,
                    userAgent: navigator.userAgent,
                    supabase: this.checkSupabaseStatus(),
                    react: this.checkReactStatus(),
                    errors: this.errors,
                    logs: this.logs.slice(-20) // Últimos 20 logs
                };
            }
        };
        
        // Capturar erros globais
        window.addEventListener('error', (event) => {
            window.FluxDebug.error('Erro global capturado:', {
                message: event.message,
                filename: event.filename,
                lineno: event.lineno,
                colno: event.colno,
                error: event.error?.toString()
            });
        });
        
        // Capturar promises rejeitadas
        window.addEventListener('unhandledrejection', (event) => {
            window.FluxDebug.error('Promise rejeitada:', {
                reason: event.reason?.toString(),
                stack: event.reason?.stack
            });
        });
        
        // Debug inicial
        window.FluxDebug.log('Sistema de debug inicializado');
    </script>

    <!-- Script de inicialização e verificação de montagem do React (Mantido) -->
    <script>
        window.FluxState = {
            loaded: false,
            reactMounted: false,
            attempts: 0,
            maxAttempts: 20, // Reduzido para ~20 segundos de espera total
            startTime: Date.now(),
            isEmergencyMode: new URLSearchParams(window.location.search).get('emergency') === '1'
        };
        
        if (window.FluxState.isEmergencyMode) {
            console.log('🆘 Modo emergência ativado');
            setTimeout(() => {
                const debugEl = document.getElementById('flux-debug');
                if (debugEl) debugEl.style.display = 'block';
            }, 1000);
        }
        
        function updateFluxStatus(message, progress = -1) { // progress -1 para não mudar
            const statusEl = document.getElementById('flux-status');
            const barEl = document.getElementById('flux-bar');
            const emergencyBtn = document.getElementById('flux-emergency');
            const attemptsEl = document.getElementById('debug-attempts');
            const timeEl = document.getElementById('debug-time');
            
            if (statusEl) statusEl.textContent = message;
            if (barEl && progress >= 0) barEl.style.width = Math.min(100, Math.max(0, progress)) + '%';
            
            if (attemptsEl) attemptsEl.textContent = window.FluxState.attempts.toString();
            if (timeEl) {
                const elapsed = Math.round((Date.now() - window.FluxState.startTime) / 1000);
                timeEl.textContent = elapsed + 's';
            }
            
            // Integrar com sistema de debug
            if (window.FluxDebug) {
                window.FluxDebug.log(`Status: ${message} (${progress >= 0 ? progress + '%' : 'no progress'})`);
            } else {
                console.log(`[FluxLoader] ${message} (${progress >=0 ? progress + '%' : 'no progress'})`);
            }
            
            const showEmergency = window.FluxState.isEmergencyMode || (Date.now() - window.FluxState.startTime > 15000);
            if (showEmergency && emergencyBtn && emergencyBtn.style.display === 'none') {
                emergencyBtn.style.display = 'block';
            }
        }
        
        function fluxEmergencyReload() { /* ... (Mantido como antes) ... */ console.log('🆘 Emergency reload triggered by user'); updateFluxStatus('🆘 Limpando dados e recarregando...', 0); try { localStorage.clear(); sessionStorage.clear(); const cookies = document.cookie.split(';'); cookies.forEach(cookie => { const [name] = cookie.split('='); if (name.trim()) { document.cookie = `${name.trim()}=; expires=Thu, 01 Jan 1970 00:00:00 GMT; path=/; domain=${document.domain.split('.').slice(-2).join('.')}`; document.cookie = `${name.trim()}=; expires=Thu, 01 Jan 1970 00:00:00 GMT; path=/; domain=.${document.domain.split('.').slice(-2).join('.')}`; document.cookie = `${name.trim()}=; expires=Thu, 01 Jan 1970 00:00:00 GMT; path=/`; } }); console.log('✅ Dados limpos com sucesso'); } catch (error) { console.error('❌ Erro ao limpar dados:', error); } setTimeout(() => { const newUrl = window.location.origin + (window.FluxState.isEmergencyMode ? '/' : '/?emergency=1'); window.location.href = newUrl; }, 1000); }
        
        updateFluxStatus('Carregando aplicação...', 10);

        function checkReactMounted() {
            window.FluxState.attempts++;
            const root = document.getElementById('root');
            const loadingDiv = document.getElementById('flux-loading');
            
            // Verifica se o React substituiu o conteúdo do loader inicial
            if (root && (!loadingDiv || !root.contains(loadingDiv) || root.innerHTML.length > 1000 /* heurística */)) {
                if (window.FluxDebug) {
                    window.FluxDebug.log('React montado com sucesso');
                } else {
                    console.log('✅ [FluxLoader] React montado com sucesso aparente.');
                }
                
                window.FluxState.reactMounted = true;
                updateFluxStatus('✅ Aplicação carregada!', 100);
                
                // Verificar status final dos componentes
                setTimeout(() => {
                    if (window.FluxDebug) {
                        window.FluxDebug.checkSupabaseStatus();
                        window.FluxDebug.checkReactStatus();
                        window.FluxDebug.testAuthentication();
                    }
                }, 1000);
                
                if (loadingDiv) {
                    loadingDiv.classList.add('hidden');
                    setTimeout(() => { if (loadingDiv.parentNode) loadingDiv.parentNode.removeChild(loadingDiv); }, 500);
                }
                const loadTime = Date.now() - window.FluxState.startTime;
                
                if (window.FluxDebug) {
                    window.FluxDebug.log(`Flux Revenue App carregado em ${loadTime}ms`);
                } else {
                    console.log(`🎉 Flux Revenue App carregado em ${loadTime}ms`);
                }
                return;
            }
            
            if (window.FluxState.attempts >= window.FluxState.maxAttempts) {
                if (window.FluxDebug) {
                    window.FluxDebug.error('Timeout de montagem do React após múltiplas tentativas');
                    // Gerar relatório de debug
                    const report = window.FluxDebug.getReport();
                    console.error('🚨 [FluxDebug] Relatório de timeout:', report);
                } else {
                    console.warn('⚠️ [FluxLoader] Timeout de montagem do React. Removendo loader.');
                }
                
                updateFluxStatus('⚠️ Timeout - Forçando exibição...', 95);
                if (loadingDiv) {
                    setTimeout(() => { loadingDiv.classList.add('hidden'); setTimeout(() => { if (loadingDiv.parentNode) loadingDiv.parentNode.removeChild(loadingDiv); }, 500); }, 1000);
                }
                return;
            }
            
            const progress = 10 + (window.FluxState.attempts / window.FluxState.maxAttempts) * 85;
            updateFluxStatus(`Aguardando componentes React... (${window.FluxState.attempts})`, progress);
            setTimeout(checkReactMounted, 500); // Verificar mais frequentemente
        }
        
        document.addEventListener('DOMContentLoaded', () => {
            if (window.FluxDebug) {
                window.FluxDebug.log('DOM carregado, iniciando aplicação');
            } else {
                console.log('✅ [FluxLoader] DOM carregado.');
            }
            
            updateFluxStatus('DOM pronto, carregando scripts...', 20);
            
            // Verificar componentes críticos após um delay
            setTimeout(() => {
                if (window.FluxDebug) {
                    window.FluxDebug.checkSupabaseStatus();
                }
            }, 1500);
            
            // Os scripts da app React são carregados com 'defer', então devem executar após o DOM.
            // A verificação de montagem do React começará após um pequeno delay.
            setTimeout(checkReactMounted, 1000); // Delay inicial antes de começar a checar
        });
        
        // ✅ Função global para debug manual
        window.fluxDebugReport = () => {
            if (window.FluxDebug) {
                const report = window.FluxDebug.getReport();
                console.log('📋 [FluxDebug] Relatório completo:', report);
                return report;
            } else {
                console.warn('Sistema de debug não disponível');
                return null;
            }
        };

        window.addEventListener('error', (event) => { /* ... (Mantido como antes) ... */ console.error('❌ Global error (index.html):', event.error); if (event.error?.message?.includes('Loading chunk') || event.error?.message?.includes('ChunkLoadError')) { updateFluxStatus('❌ Erro de carregamento de módulo - tentando recarregar...', 0); setTimeout(() => window.location.reload(), 3000); } });
        window.addEventListener('unhandledrejection', (event) => { /* ... (Mantido como antes) ... */ console.error('❌ Unhandled rejection (index.html):', event.reason); });
    </script>
