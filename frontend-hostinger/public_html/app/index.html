<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8" />
    <link rel="icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="theme-color" content="#007AFF" />
    <meta name="description" content="Flux Revenue - Otimização de Receita Google AdSense com IA Avançada" />
    
    <title>Flux Revenue - Otimização AdSense</title>
    
    <!-- ✅ Preload CRÍTICO dos bundles React -->
    <link rel="preload" href="/static/css/main.7c1a59a0.css" as="style">
    <link rel="preload" href="/static/js/runtime.8d383a98.js" as="script">
    <link rel="preload" href="/static/js/vendors.78dfa95f.js" as="script">
    <link rel="preload" href="/static/js/main.8ea78a99.js" as="script">
    
    <!-- ✅ Preconnections -->
    <link rel="preconnect" href="https://unpkg.com" crossorigin>
    <link rel="preconnect" href="https://cykfgwzzvlnkqundyxrq.supabase.co" crossorigin>
    
    <!-- ✅ CSS Crítico inline -->
    <style>
        body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
        .flux-loading {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
            background: linear-gradient(135deg, #F2F2F7 0%, #E5E5EA 100%);
            z-index: 9999; transition: opacity 0.5s ease;
        }
        .flux-loading.hidden { opacity: 0; pointer-events: none; }
        .flux-content {
            text-align: center; padding: 48px; background: white;
            border-radius: 24px; box-shadow: 0 8px 32px rgba(0,0,0,0.12);
            max-width: 400px; margin: 0 24px;
        }
        .flux-spinner {
            width: 60px; height: 60px; margin: 0 auto 24px;
            background: linear-gradient(135deg, #007AFF 0%, #30D158 100%);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            animation: spin 2s linear infinite; font-size: 24px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .flux-emergency { 
            background: #ff4444 !important; color: white; padding: 12px 24px; 
            border: none; border-radius: 8px; cursor: pointer; margin-top: 16px;
            font-weight: 600; transition: background 0.3s;
        }
        .flux-emergency:hover { background: #cc0000 !important; }
        .flux-status { margin: 16px 0; color: #6D6D70; font-size: 16px; }
    </style>
</head>
<body>
    <noscript>
        <div style="padding: 48px; text-align: center; background: #F2F2F7; min-height: 100vh; display: flex; align-items: center; justify-content: center;">
            <div style="background: white; padding: 48px; border-radius: 24px; max-width: 400px;">
                <h2 style="margin: 0 0 16px 0; color: #1D1D1F;">🚀 Flux Revenue</h2>
                <p style="margin: 0; color: #6D6D70;">JavaScript é necessário para usar esta aplicação.</p>
                <p style="margin: 16px 0 0 0; color: #8E8E93; font-size: 14px;">Por favor, habilite JavaScript em seu navegador.</p>
            </div>
        </div>
    </noscript>
    
    <div id="root">
        <div class="flux-loading" id="flux-loading">
            <div class="flux-content">
                <div class="flux-spinner">⚡</div>
                <h2 style="margin: 0 0 8px 0; color: #1D1D1F; font-size: 24px;">🚀 Flux Revenue</h2>
                <p id="flux-status" class="flux-status">Inicializando sistema...</p>
                <div id="flux-progress" style="width: 100%; max-width: 300px; height: 6px; background: rgba(0, 122, 255, 0.2); margin: 24px auto; border-radius: 3px; overflow: hidden;">
                    <div id="flux-bar" style="width: 0%; height: 100%; background: linear-gradient(90deg, #007AFF, #30D158); transition: width 0.3s ease; border-radius: 3px;"></div>
                </div>
                <button id="flux-emergency" class="flux-emergency" style="display: none;" onclick="fluxEmergencyReload()">🆘 Recarregar Forçado</button>
                <div id="flux-debug" style="margin-top: 16px; font-size: 12px; color: #8E8E93; display: none;">
                    <div>Tentativas: <span id="debug-attempts">0</span></div>
                    <div>Tempo: <span id="debug-time">0s</span></div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- ✅ ENTERPRISE: Estado global e utilitários -->
    <script>
        // ✅ Estado global para dashboard
        window.FluxState = {
            loaded: false,
            reactMounted: false,
            attempts: 0,
            maxAttempts: 20,
            startTime: Date.now(),
            isEmergencyMode: false
        };
        
        // ✅ Verificar modo emergência
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('emergency') === '1') {
            window.FluxState.isEmergencyMode = true;
            console.log('🆘 Modo emergência ativado');
            
            // Mostrar debug info
            setTimeout(() => {
                const debugEl = document.getElementById('flux-debug');
                if (debugEl) debugEl.style.display = 'block';
            }, 2000);
        }
        
        // ✅ Status updater enterprise
        function updateFluxStatus(message, progress = 0) {
            const statusEl = document.getElementById('flux-status');
            const barEl = document.getElementById('flux-bar');
            const emergencyBtn = document.getElementById('flux-emergency');
            const attemptsEl = document.getElementById('debug-attempts');
            const timeEl = document.getElementById('debug-time');
            
            if (statusEl) statusEl.textContent = message;
            if (barEl) barEl.style.width = Math.min(100, Math.max(0, progress)) + '%';
            
            // ✅ Update debug info
            if (attemptsEl) attemptsEl.textContent = window.FluxState.attempts;
            if (timeEl) {
                const elapsed = Math.round((Date.now() - window.FluxState.startTime) / 1000);
                timeEl.textContent = elapsed + 's';
            }
            
            console.log(`🔄 Flux: ${message} (${progress}%)`);
            
            // ✅ Mostrar botão de emergência após 15 segundos ou em modo emergência
            const showEmergency = window.FluxState.isEmergencyMode || (Date.now() - window.FluxState.startTime > 15000);
            if (showEmergency && emergencyBtn) {
                emergencyBtn.style.display = 'block';
            }
        }
        
        // ✅ Emergency reload enterprise
        function fluxEmergencyReload() {
            console.log('🆘 Emergency reload triggered by user');
            updateFluxStatus('🆘 Limpando dados e recarregando...', 0);
            
            // ✅ Limpar tudo
            try {
                localStorage.clear();
                sessionStorage.clear();
                
                // ✅ Limpar cookies básicos
                const cookies = document.cookie.split(';');
                cookies.forEach(cookie => {
                    const [name] = cookie.split('=');
                    if (name.trim()) {
                        document.cookie = `${name.trim()}=; expires=Thu, 01 Jan 1970 00:00:00 GMT; path=/`;
                    }
                });
                
                console.log('✅ Dados limpos com sucesso');
            } catch (error) {
                console.error('❌ Erro ao limpar dados:', error);
            }
            
            // ✅ Recarregar após delay
            setTimeout(() => {
                const newUrl = window.location.origin + (window.FluxState.isEmergencyMode ? '/' : '/?emergency=1');
                window.location.href = newUrl;
            }, 1000);
        }
        
        updateFluxStatus('Inicializando dashboard...', 10);
    </script>
    
    <!-- ✅ ORIGINAL: Scripts de autenticação simples que funcionavam -->
    <script src="/supabase/configv2.js" 
            onload="updateFluxStatus('Config carregado...', 30);"
            onerror="console.error('❌ Falha ao carregar configv2.js');"></script>
    
    <script src="https://unpkg.com/@supabase/supabase-js@2" crossorigin
            onload="updateFluxStatus('Supabase CDN carregado...', 50);"
            onerror="console.error('❌ Falha no Supabase CDN');"></script>
    
    <script src="/supabase/flux-supabase.js" 
            onload="updateFluxStatus('Supabase inicializado...', 70);"
            onerror="console.error('❌ Falha ao carregar flux-supabase.js');"></script>
    
    <!-- ✅ ORIGINAL: Lógica simples de verificação React que funcionava -->
    <script>
        // ✅ ORIGINAL: Aguardar React carregar e limpar loading
        function checkReactMounted() {
            window.FluxState.attempts++;
            
            const root = document.getElementById('root');
            const loading = document.getElementById('flux-loading');
            
            // ✅ ORIGINAL: Verificação simples se React montou
            if (root && !root.innerHTML.includes('flux-loading')) {
                console.log('✅ [Flux] React mounted successfully');
                window.FluxState.reactMounted = true;
                
                updateFluxStatus('✅ Dashboard carregado!', 100);
                
                if (loading) {
                    loading.classList.add('hidden');
                    setTimeout(() => {
                        if (loading.parentNode) {
                            loading.parentNode.removeChild(loading);
                        }
                    }, 500);
                }
                
                const loadTime = Date.now() - window.FluxState.startTime;
                console.log(`🎉 Flux Revenue loaded in ${loadTime}ms`);
                return;
            }
            
            // ✅ ENTERPRISE: Timeout melhorado
            if (window.FluxState.attempts >= window.FluxState.maxAttempts) {
                console.warn('⚠️ React mount timeout, forcing removal');
                updateFluxStatus('⚠️ Timeout - forçando carregamento...', 95);
                
                if (loading) {
                    setTimeout(() => {
                        loading.classList.add('hidden');
                        setTimeout(() => {
                            if (loading.parentNode) loading.parentNode.removeChild(loading);
                        }, 500);
                    }, 2000);
                }
                return;
            }
            
            // ✅ ENTERPRISE: Progress visual
            const progress = 70 + (window.FluxState.attempts / window.FluxState.maxAttempts) * 25;
            updateFluxStatus(`Aguardando React... (${window.FluxState.attempts}/${window.FluxState.maxAttempts})`, progress);
            
            // ✅ ORIGINAL: Timeout de 1 segundo
            setTimeout(checkReactMounted, 1000);
        }
        
        // ✅ ORIGINAL: DOM loaded listener
        document.addEventListener('DOMContentLoaded', () => {
            console.log('✅ [Flux] DOM loaded');
            updateFluxStatus('DOM carregado, aguardando React...', 80);
            
            // ✅ ORIGINAL: Aguardar 2 segundos antes de começar verificação
            setTimeout(checkReactMounted, 2000);
            
            // ✅ ORIGINAL: Visibility throttling simples
            let lastVisibilityTime = 0;
            document.addEventListener('visibilitychange', () => {
                const now = Date.now();
                if (now - lastVisibilityTime > 1000) { // 1 segundo throttle
                    lastVisibilityTime = now;
                    console.log('👁️ [Flux] Visibility:', document.visibilityState);
                }
            });
        });
    </script>
    
    <!-- ✅ React Bundles com error handling enterprise -->
    <script defer src="/static/js/runtime.8d383a98.js" 
            onerror="console.error('❌ Runtime bundle failed'); updateFluxStatus('❌ Erro no runtime', 0);"></script>
    <script defer src="/static/js/vendors.78dfa95f.js" 
            onerror="console.error('❌ Vendors bundle failed'); updateFluxStatus('❌ Erro nos vendors', 0);"></script>
    <script defer src="/static/js/main.8ea78a99.js" 
            onerror="console.error('❌ Main bundle failed'); updateFluxStatus('❌ Erro no main bundle', 0);"></script>
    
    <!-- ✅ ENTERPRISE: Emergency timeout e error handling -->
    <script>
        // ✅ Emergency timeout de 30 segundos
        setTimeout(() => {
            if (document.getElementById('flux-loading') && !window.FluxState.reactMounted) {
                console.log('🆘 Emergency timeout - forcing reload');
                updateFluxStatus('🆘 Timeout crítico - recarregando...', 0);
                setTimeout(fluxEmergencyReload, 3000);
            }
        }, 30000);
        
        // ✅ Error handling global enterprise
        window.addEventListener('error', (event) => {
            console.error('❌ Global error:', event.error);
            
            if (event.error?.message?.includes('Loading chunk') || 
                event.error?.message?.includes('ChunkLoadError')) {
                updateFluxStatus('❌ Erro de carregamento - tentando novamente...', 0);
                setTimeout(() => window.location.reload(), 3000);
            }
        });
        
        window.addEventListener('unhandledrejection', (event) => {
            console.error('❌ Unhandled rejection:', event.reason);
        });
    </script>
</body>
</html>
