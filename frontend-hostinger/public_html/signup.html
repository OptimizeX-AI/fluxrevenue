<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flux Revenue - Cadastro</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/supabase/configv2.js"></script>
    <script type="module" src="/supabase/flux-supabase.js"></script>
    
    <style>
        /* ... (todo o CSS original permanece o mesmo) ... */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        * { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; }
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 4px; }
        .glass-card { /* Estilo do seu .glass-card */ background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.2); }
        .input-field { /* Estilo do seu .input-field */ background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3); }
        .btn-primary { /* Estilo do seu .btn-primary */ background: #007AFF; /* Exemplo */ }
        .badge { /* Estilo do seu .badge */ background: rgba(0,0,0,0.2); }
        .message-box { padding: 1rem; border-radius: 0.75rem; text-align: center; font-size: 0.875rem; margin-top: 1.5rem; margin-bottom: 1.5rem; }
        .error-message { background: rgba(239, 68, 68, 0.2); border: 1px solid rgba(239, 68, 68, 0.3); color: #fca5a5; }
        .success-message { background: rgba(16, 185, 129, 0.2); border: 1px solid rgba(16, 185, 129, 0.3); color: #a7f3d0; }
        .hidden { display: none; }
        .loading-spinner { display: inline-block; width: 1.25rem; height: 1.25rem; border: 2px solid currentColor; border-radius: 50%; border-top-color: transparent; animation: spin 1s linear infinite; margin-right: 0.5rem; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="flex items-center justify-center p-4 relative overflow-hidden">
    <!-- ... (HTML do corpo original permanece o mesmo, garantindo que os IDs dos inputs e botões sejam mantidos) ... -->
    <div class="relative z-10 w-full max-w-md">
        <div class="glass-card rounded-3xl p-8">
            <div class="text-center mb-8">
                <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-white bg-opacity-20 mb-6">
                    <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/></svg>
                </div>
                <h1 class="text-4xl font-light text-white mb-2 tracking-tight">Flux</h1>
                <p class="text-white text-opacity-80 font-light text-lg mb-4">Revenue reimaginado</p>
                <div class="inline-flex items-center badge rounded-full px-4 py-2">
                    <svg class="w-4 h-4 text-green-300 mr-2" fill="currentColor" viewBox="0 0 24 24"><path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                    <span class="text-green-200 text-sm font-medium">7 dias gratuitos</span>
                </div>
            </div>
            <form id="signupForm" class="space-y-6">
                <div class="space-y-4">
                    <div><input id="company" name="company" type="text" required placeholder="Nome da Empresa" autocomplete="organization" class="input-field w-full px-6 py-4 rounded-2xl text-white placeholder-white placeholder-opacity-60 focus:outline-none"></div>
                    <div><input id="email" name="email" type="email" required placeholder="Email" autocomplete="email" class="input-field w-full px-6 py-4 rounded-2xl text-white placeholder-white placeholder-opacity-60 focus:outline-none"></div>
                    <div><input id="password" name="password" type="password" required minlength="6" placeholder="Senha (mín. 6 caracteres)" autocomplete="new-password" class="input-field w-full px-6 py-4 rounded-2xl text-white placeholder-white placeholder-opacity-60 focus:outline-none"></div>
                    <div><input id="confirmPassword" name="confirmPassword" type="password" required minlength="6" placeholder="Confirmar Senha" autocomplete="new-password" class="input-field w-full px-6 py-4 rounded-2xl text-white placeholder-white placeholder-opacity-60 focus:outline-none"></div>
                </div>
                <button type="submit" id="signupBtn" class="btn-primary w-full py-4 rounded-2xl text-white font-medium text-lg disabled:opacity-50">Começar Grátis</button>
                <div id="errorMessage" class="message-box error-message hidden"></div>
                <div id="successMessage" class="message-box success-message hidden"></div>
                <p class="text-white text-opacity-60 text-xs text-center leading-relaxed">Ao criar uma conta, você concorda com nossos <a href="#" class="text-white underline decoration-white decoration-opacity-50">Termos de Uso</a> e <a href="#" class="text-white underline decoration-white decoration-opacity-50">Política de Privacidade</a></p>
            </form>
            <div class="mt-8 space-y-6">
                <div class="text-center"><p class="text-white text-opacity-80 text-sm">Já tem conta? <a href="login.html" class="text-white font-medium hover:text-opacity-80 transition-opacity underline decoration-white decoration-opacity-50">Faça login</a></p></div>
                <div class="text-center"><a href="/" class="inline-flex items-center text-white text-opacity-60 text-sm hover:text-opacity-80 transition-opacity"><svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>Voltar ao início</a></div>
            </div>
        </div>
        <div class="absolute -top-4 -right-4 w-3 h-3 rounded-full bg-white opacity-40"></div>
        <div class="absolute -bottom-4 -left-4 w-2 h-2 rounded-full bg-white opacity-30"></div>
    </div>
    
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const signupForm = document.getElementById('signupForm');
            const signupBtn = document.getElementById('signupBtn');
            const errorMessage = document.getElementById('errorMessage');
            const successMessage = document.getElementById('successMessage');
            let supabaseClient = null; // Será inicializado em initializeSignupPage

            function showMessage(element, message, isError = true) { /* ... (como antes) ... */ element.textContent = message; element.classList.remove('hidden'); if (isError) { element.classList.add('error-message'); element.classList.remove('success-message'); } else { element.classList.add('success-message'); element.classList.remove('error-message'); } }
            function hideMessages() { /* ... (como antes) ... */ errorMessage.classList.add('hidden'); successMessage.classList.add('hidden'); }
            function setLoading(isLoading) { /* ... (como antes) ... */ signupBtn.disabled = isLoading; signupBtn.innerHTML = isLoading ? `<div class="flex items-center justify-center"><svg class="loading-spinner" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>Criando conta...</div>` : 'Começar Grátis'; }

            async function initializeSignupPage() {
                let attempts = 0;
                const maxAttempts = 50;
                // Esperar por window.supabase (inicializado por flux-supabase.js) e window.FluxConfig
                while ((!window.supabase || !window.FluxConfig) && attempts < maxAttempts) {
                    await new Promise(resolve => setTimeout(resolve, 100));
                    attempts++;
                }

                if (!window.supabase || !window.FluxConfig) {
                    showMessage(errorMessage, "Erro: Falha ao carregar componentes essenciais. Tente recarregar.", true);
                    setLoading(false); // Habilitar o botão se houver erro de inicialização
                    return;
                }
                supabaseClient = window.supabase; // Usar a instância global do Supabase

                // Verificar se o usuário já está logado (usando o cliente Supabase diretamente)
                const { data: { session } } = await supabaseClient.auth.getSession();
                if (session?.user) {
                    showMessage(successMessage, "Você já está logado. Redirecionando...", false);
                    setTimeout(() => { window.location.href = window.FluxConfig.app.url; }, 1000);
                    return;
                }

                signupForm.addEventListener('submit', async (e) => {
                    e.preventDefault();
                    hideMessages();
                    setLoading(true);

                    const company = document.getElementById('company').value.trim();
                    const email = document.getElementById('email').value.trim();
                    const password = document.getElementById('password').value;
                    const confirmPassword = document.getElementById('confirmPassword').value;

                    if (!company || !email || !password) {
                        showMessage(errorMessage, 'Todos os campos são obrigatórios.', true);
                        setLoading(false);
                        return;
                    }
                    if (password !== confirmPassword) {
                        showMessage(errorMessage, 'As senhas não coincidem.', true);
                        setLoading(false);
                        return;
                    }
                    if (password.length < 6) {
                        showMessage(errorMessage, 'A senha deve ter pelo menos 6 caracteres.', true);
                        setLoading(false);
                        return;
                    }

                    try {
                        // Chamar a Edge Function 'register-user'
                        const { data: efResponse, error: efError } = await supabaseClient.functions.invoke('register-user', {
                            body: { email, password, company }
                        });

                        if (efError) {
                            console.error("Erro ao invocar EF 'register-user':", efError);
                            throw new Error(efError.message || 'Erro de comunicação com o servidor.');
                        }

                        if (efResponse.error) { // Erro de lógica de negócios da EF
                            console.error("Erro retornado pela EF 'register-user':", efResponse.error);
                            throw new Error(efResponse.error);
                        }

                        // Sucesso - a EF register-user já lida com email_confirm: true
                        // A EF retorna user, client, trial_info
                        console.log("Resposta da EF 'register-user':", efResponse);
                        showMessage(successMessage, 'Conta criada com sucesso! Verifique seu e-mail para confirmar e depois faça login.', false);

                        // Opcional: redirecionar para login após um tempo
                        setTimeout(() => {
                            if (window.FluxConfig && window.FluxConfig.app && window.FluxConfig.app.loginUrl) {
                                window.location.href = window.FluxConfig.app.loginUrl;
                            } else {
                                window.location.href = '/login.html'; // Fallback
                            }
                        }, 4000);

                    } catch (error) {
                        let errorMsg = 'Erro ao criar conta. Tente novamente mais tarde.';
                        if (error instanceof Error) {
                            if (error.message.includes('already been registered') || error.message.includes('already registered')) {
                                errorMsg = 'Este e-mail já está cadastrado. Tente fazer login.';
                            } else if (error.message.includes('Invalid email')) { // Se a EF retornar isso
                                errorMsg = 'E-mail inválido. Verifique o formato.';
                            } else if (error.message.includes('Password should be at least')) { // Se a EF retornar isso
                                errorMsg = 'A senha deve ter pelo menos 6 caracteres.';
                            } else if (error.message.includes('network error') || error.message.includes('Failed to fetch')) {
                                errorMsg = 'Erro de conexão. Verifique sua internet e tente novamente.';
                            } else {
                                // Para outros erros da EF ou de comunicação
                                errorMsg = error.message || errorMsg;
                            }
                        }
                        showMessage(errorMessage, errorMsg, true);
                        console.error("Erro no processo de signup:", error);
                    } finally {
                        setLoading(false);
                    }
                });
            }
            
            initializeSignupPage();
        });
    </script>
</body>
</html>
