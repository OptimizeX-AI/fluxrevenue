services:
  redis:
    image: "redis:alpine"
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  postgres:
    image: "postgres:13-alpine"
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=jules
      - POSTGRES_PASSWORD=jules
      - POSTGRES_DB=jules_db
    volumes:
      - postgres_data:/var/lib/postgresql/data

  qdrant:
    image: "qdrant/qdrant:latest"
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  rabbitmq:
    image: "rabbitmq:3-management"
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=user
      - RABBITMQ_DEFAULT_PASS=password
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  api_gateway:
    build:
      context: ./services/api_gateway
    ports:
      - "8000:8000"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - POSTGRES_USER=jules
      - POSTGRES_PASSWORD=jules
      - POSTGRES_DB=jules_db
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - RABBITMQ_HOST=rabbitmq
    depends_on:
      - redis
      - postgres
      - qdrant
      - rabbitmq

  database_architect:
    build:
      context: ./services/database_architect
    ports:
      - "8006:8006"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - POSTGRES_USER=jules
      - POSTGRES_PASSWORD=jules
      - POSTGRES_DB=jules_db
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - RABBITMQ_HOST=rabbitmq
    depends_on:
      - redis
      - postgres
      - qdrant
      - rabbitmq

  devops_agent:
    build:
      context: ./services/devops_agent
    ports:
      - "8007:8007"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - POSTGRES_USER=jules
      - POSTGRES_PASSWORD=jules
      - POSTGRES_DB=jules_db
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - RABBITMQ_HOST=rabbitmq
    depends_on:
      - redis
      - postgres
      - qdrant
      - rabbitmq

  security_agent:
    build:
      context: ./services/security_agent
    ports:
      - "8008:8008"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - POSTGRES_USER=jules
      - POSTGRES_PASSWORD=jules
      - POSTGRES_DB=jules_db
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - RABBITMQ_HOST=rabbitmq
    depends_on:
      - redis
      - postgres
      - qdrant
      - rabbitmq

  qa_agent:
    build:
      context: ./services/qa_agent
    ports:
      - "8004:8004"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - POSTGRES_USER=jules
      - POSTGRES_PASSWORD=jules
      - POSTGRES_DB=jules_db
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - RABBITMQ_HOST=rabbitmq
    depends_on:
      - redis
      - postgres
      - qdrant
      - rabbitmq

  code_reviewer:
    build:
      context: ./services/code_reviewer
    ports:
      - "8005:8005"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - POSTGRES_USER=jules
      - POSTGRES_PASSWORD=jules
      - POSTGRES_DB=jules_db
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - RABBITMQ_HOST=rabbitmq
    depends_on:
      - redis
      - postgres
      - qdrant
      - rabbitmq

  code_architect:
    build:
      context: ./services/code_architect
    ports:
      - "8002:8002"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - POSTGRES_USER=jules
      - POSTGRES_PASSWORD=jules
      - POSTGRES_DB=jules_db
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - RABBITMQ_HOST=rabbitmq
    depends_on:
      - redis
      - postgres
      - qdrant
      - rabbitmq

  developer_agent:
    build:
      context: ./services/developer_agent
    ports:
      - "8003:8003"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - POSTGRES_USER=jules
      - POSTGRES_PASSWORD=jules
      - POSTGRES_DB=jules_db
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - RABBITMQ_HOST=rabbitmq
    depends_on:
      - redis
      - postgres
      - qdrant
      - rabbitmq

  memory_agent:
    build:
      context: ./services/memory_agent
    ports:
      - "8009:8009"
    volumes:
      - ./memory_logs:/app/logs
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - POSTGRES_USER=jules
      - POSTGRES_PASSWORD=jules
      - POSTGRES_DB=jules_db
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - RABBITMQ_HOST=rabbitmq
    depends_on:
      - redis
      - postgres
      - qdrant
      - rabbitmq

  agent_manager:
    build:
      context: ./services/agent_manager
    ports:
      - "8001:8001"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - POSTGRES_USER=jules
      - POSTGRES_PASSWORD=jules
      - POSTGRES_DB=jules_db
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - RABBITMQ_HOST=rabbitmq
    depends_on:
      - redis
      - postgres
      - qdrant
      - rabbitmq

  agent_registry:
    build:
      context: ./services/agent_registry
    ports:
      - "8010:8010"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_DEFAULT_USER=user
      - RABBITMQ_DEFAULT_PASS=password
    depends_on:
      - redis
      - rabbitmq

volumes:
  redis_data:
  postgres_data:
  qdrant_data:
  rabbitmq_data:
  prometheus_data:
  grafana_data:

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning/:/etc/grafana/provisioning/
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    command: ["--config=/etc/otel-collector-config.yml"]
    volumes:
      - ./monitoring/otel-collector/otel-collector-config.yml:/etc/otel-collector-config.yml
    ports:
      - "4317:4317" # OTLP gRPC
      - "4318:4318" # OTLP HTTP

  jaeger:
    image: jaegertracing/all-in-one:latest
    ports:
      - "16686:16686" # Jaeger UI
      - "14250:14250" # Collector
