      - POSTGRES_PASSWORD=jules
      - POSTGRES_DB=jules_db
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
