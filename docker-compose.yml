services:
  redis:
    image: "redis:alpine"
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  postgres:
    image: "postgres:13-alpine"
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=jules
      - POSTGRES_PASSWORD=jules
      - POSTGRES_DB=jules_db
    volumes:
      - postgres_data:/var/lib/postgresql/data

  qdrant:
    image: "qdrant/qdrant:latest"
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  api_gateway:
    build:
      context: ./services/api_gateway
    ports:
      - "8000:8000"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - POSTGRES_USER=jules
      - POSTGRES_PASSWORD=jules
      - POSTGRES_DB=jules_db
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
    depends_on:
      - redis
      - postgres
      - qdrant

  database_architect:
    build:
      context: ./services/database_architect
    ports:
      - "8006:8006"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - POSTGRES_USER=jules
      - POSTGRES_PASSWORD=jules
      - POSTGRES_DB=jules_db
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
    depends_on:
      - redis
      - postgres
      - qdrant

  devops_agent:
    build:
      context: ./services/devops_agent
    ports:
      - "8007:8007"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - POSTGRES_USER=jules
      - POSTGRES_PASSWORD=jules
      - POSTGRES_DB=jules_db
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
    depends_on:
      - redis
      - postgres
      - qdrant

  security_agent:
    build:
      context: ./services/security_agent
    ports:
      - "8008:8008"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - POSTGRES_USER=jules
      - POSTGRES_PASSWORD=jules
      - POSTGRES_DB=jules_db
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
    depends_on:
      - redis
      - postgres
      - qdrant

  qa_agent:
    build:
      context: ./services/qa_agent
    ports:
      - "8004:8004"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - POSTGRES_USER=jules
      - POSTGRES_PASSWORD=jules
      - POSTGRES_DB=jules_db
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
    depends_on:
      - redis
      - postgres
      - qdrant

  code_reviewer:
    build:
      context: ./services/code_reviewer
    ports:
      - "8005:8005"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - POSTGRES_USER=jules
      - POSTGRES_PASSWORD=jules
      - POSTGRES_DB=jules_db
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
    depends_on:
      - redis
      - postgres
      - qdrant

  code_architect:
    build:
      context: ./services/code_architect
    ports:
      - "8002:8002"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - POSTGRES_USER=jules
      - POSTGRES_PASSWORD=jules
      - POSTGRES_DB=jules_db
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
    depends_on:
