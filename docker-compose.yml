      context: ./services/developer_agent
    ports:
      - "8003:8003"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - POSTGRES_USER=jules
      - POSTGRES_PASSWORD=jules
      - POSTGRES_DB=jules_db
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
    depends_on:
      - redis
      - postgres
      - qdrant

  memory_agent:
    build:
      context: ./services/memory_agent
    ports:
      - "8009:8009"
    volumes:
      - ./memory_logs:/app/logs
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - POSTGRES_USER=jules
      - POSTGRES_PASSWORD=jules
      - POSTGRES_DB=jules_db
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
    depends_on:
      - redis
