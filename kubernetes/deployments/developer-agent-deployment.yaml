apiVersion: apps/v1
kind: Deployment
metadata:
  name: developer-agent-deployment
  namespace: flux-prod
  labels:
    app: developer-agent
spec:
  replicas: 3 # Start with 3 replicas
  selector:
    matchLabels:
      app: developer-agent
  template:
    metadata:
      labels:
        app: developer-agent
    spec:
      containers:
      - name: developer-agent
        image: fluxrevenue/developer-agent:latest # The image should be available in a container registry
        ports:
        - containerPort: 8003 # Port from docker-compose.yml
        envFrom:
        - configMapRef:
            name: agent-config
        - secretRef:
            name: agent-secrets
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health # Assuming a /health endpoint exists
            port: 8003
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8003
          initialDelaySeconds: 15
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
