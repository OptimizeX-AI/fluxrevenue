apiVersion: v1
kind: Secret
metadata:
  name: agent-secrets
  namespace: flux-prod
type: Opaque
data:
  # Sensitive data should be base64 encoded.
  # Example: echo -n 'jules' | base64 -> anVsZXM=
  # Example: echo -n 'supersecretpassword' | base64 -> c3VwZXJzZWNyZXRwYXNzd29yZA==

  POSTGRES_USER: anVsZXM=
  POSTGRES_PASSWORD: c3VwZXJzZWNyZXRwYXNzd29yZA== # Using a more secure example password
  RABBITMQ_DEFAULT_USER: dXNlcg==
  RABBITMQ_DEFAULT_PASS: cGFzc3dvcmQ=
  JWT_SECRET: aS1hbS1hLXZlcnktc2VjdXJlLWtleQo= # A base64 encoded JWT secret
