apiVersion: v1
kind: ConfigMap
metadata:
  name: agent-config
  namespace: flux-prod # Best practice to use namespaces
data:
  # Common environment variables for agents
  REDIS_HOST: "redis-service.flux-prod.svc.cluster.local"
  REDIS_PORT: "6379"
  RABBITMQ_HOST: "rabbitmq-service.flux-prod.svc.cluster.local"
  QDRANT_HOST: "qdrant-service.flux-prod.svc.cluster.local"
  QDRANT_PORT: "6333"
  LOG_LEVEL: "INFO"
